name: Daily Data Update — P2-ETF-HURST (OHLCV Only)

on:
  schedule:
    # Runs Mon–Fri at 01:00 UTC (before the training pipeline)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # allow manual trigger

jobs:
  update-ohlcv-data:
    name: Update OHLCV Data (All ETFs)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run incremental data update
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python daily_data_update.py
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-update-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
