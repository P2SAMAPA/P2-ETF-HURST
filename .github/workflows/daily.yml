# daily.yml — P2-ETF-HAWKES
# Daily training pipeline: fetch OHLCV, fit Hawkes, generate signals, push to HF
# Runs at 9pm EST (02:00 UTC) on weekdays — after market close
# Can also be triggered manually from Streamlit app or GitHub Actions UI

name: Daily Training Pipeline

on:
  schedule:
    - cron: "0 2 * * 2-6"    # 02:00 UTC = 9pm EST Mon-Fri
  workflow_dispatch:          # manual trigger from app or GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      HF_TOKEN:     ${{ secrets.HF_TOKEN }}
      GH_PAT:       ${{ secrets.GH_PAT }}
      GITHUB_REPO:  ${{ secrets.GITHUB_REPO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily training pipeline
        run: python train.py

      - name: Log completion
        run: echo "✅ P2-ETF-HAWKES pipeline complete $(date -u)"
