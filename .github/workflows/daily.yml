name: Daily HRC Pipeline

on:
  schedule:
    - cron: "0 2 * * 2-6"   # 02:00 UTC = 9pm EST Mon-Fri (after market close)
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HRC pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
