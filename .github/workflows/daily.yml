name: P2-ETF-HURST Daily Pipeline

on:
  schedule:
    - cron: "0 2 * * 1-5"   # 02:00 UTC Mon–Fri (unchanged)
  workflow_dispatch:          # keep manual trigger (unchanged)

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 40       # was 30; +10min for MFDFA (fast — numpy only)

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Install deps ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ════════════════════════════════════════════════════════════════════════
      # EXISTING HURST PIPELINE — UNCHANGED
      # ════════════════════════════════════════════════════════════════════════

      # ── HURST Option A (FI) ──────────────────────────────────────────────────
      - name: Run HURST pipeline — Option A (Fixed Income)
        env:
          HF_TOKEN:   ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GH_PAT:     ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: python train.py --option a

      # ── HURST Option B (Equity) ───────────────────────────────────────────────
      - name: Run HURST pipeline — Option B (Equity)
        env:
          HF_TOKEN:   ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GH_PAT:     ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: python train.py --option b

      # ════════════════════════════════════════════════════════════════════════
      # NEW — MFDFA MODULE (runs after HURST, reuses same OHLCV from HF)
      # ════════════════════════════════════════════════════════════════════════

      # ── MFDFA Option A (FI) ──────────────────────────────────────────────────
      - name: Run MFDFA pipeline — Option A (Fixed Income)
        env:
          HF_TOKEN:   ${{ secrets.HF_TOKEN }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: python train_mfdfa.py --option a

      # ── MFDFA Option B (Equity) ───────────────────────────────────────────────
      - name: Run MFDFA pipeline — Option B (Equity)
        env:
          HF_TOKEN:   ${{ secrets.HF_TOKEN }}
          GITHUB_REPO: ${{ secrets.GITHUB_REPO }}
        run: python train_mfdfa.py --option b
